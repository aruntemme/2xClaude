name: TwoXClaude
options:
  bundleIdPrefix: com.temme
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  DEVELOPMENT_TEAM: "9Q5LCX7YV6"

targets:
  TwoXClaude:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      INFOPLIST_FILE: App/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.temme.twoxclaude
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: "2x Claude"
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
      SWIFT_EMIT_LOC_STRINGS: YES
      CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: TwoXClaudeWidgetExtension

  TwoXClaudeWidgetExtension:
    type: app-extension
    platform: iOS
    product: TwoXClaudeWidgetExtension
    sources:
      - path: Widget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      INFOPLIST_FILE: Widget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.temme.twoxclaude.widget
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      SWIFT_EMIT_LOC_STRINGS: YES
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    dependencies: []
